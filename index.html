<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AudioX - Audífonos Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      background: #111;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      color: #00e0ff;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(135deg, #00e0ff, #6a00ff);
    }

    .hero h2 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .btn {
      background: black;
      color: white;
      padding: 12px 20px;
      border-radius: 10px;
      text-decoration: none;
      display: inline-block;
      margin-top: 20px;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 50px;
      flex-wrap: wrap;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 15px;
      width: 250px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #111;
      margin-top: 40px;
    }
  </style>
</head>

<body>

  <header>
    <h1>AudioX 🎧</h1>
    <nav>
      <a href="#" style="color:white; margin-right:15px;">Inicio</a>
      <a href="#" style="color:white;">Contacto</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Audífonos Pro Max Sound</h2>
    <p>Sonido brutal, bajos potentes y diseño gamer.</p>
    <a class="btn" href="#">Comprar ahora</a>
  </section>

  <section class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1518441902117-f0a1f2f3f0b5" />
      <h3>AudioX Bass</h3>
      <p>S/ 199</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1583394838336-acd977736f90" />
      <h3>AudioX Pro</h3>
      <p>S/ 299</p>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1518441902117-f0a1f2f3f0b5" />
      <h3>AudioX Gamer</h3>
      <p>S/ 349</p>
    </div>

  </section>

  <footer>
    © 2026 AudioX - Todos los derechos reservados
  </footer>

</body>
</html>
